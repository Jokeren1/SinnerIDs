<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus ID Menu</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="mainMenu">
        Main Menu

        <div class = "grid-container">
            <div id = "sinnerGrid" class = "grid-container"></div>
        </div>
    </div>

    <div id="idMenu" hidden>
        <div class="id-menu-layout">
            <div class="selected-id-panel">
                <h1 id="selectedSinnerName">
                    Yi Sang
                </h1>

                <img
                    id="equippedIDPortrait"
                    src=""
                    alt=""
                >

                <p id="equippedIDName">
                    LCB Sinner
                </p>

                <button id="backButton">
                    Back
                </button>

            </div>

            <div
                id="idGrid"
                class="id-grid"
            >
            </div>
        </div>

    </div>
    
    <div id="idViewer" hidden>
        ID Viewer
        <img
            id="FullArt"
            src=""
            alt=""
        >

        <button id="backButton2">
            Back
        </button>

        <h1 id="idNameText"></h1>
        <p id="quoteText"></p>
        <div id="skillGrid"></div>
        <audio id="voiceLine"></audio>
    </div>

    <script type="module" src="src/main.js"></script>

</body>
</html>
